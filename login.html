<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drizzle Dance - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5B21B6,#7C3AED);
    overflow:hidden;
    position:relative;
}

/* Background */

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
}

.circle1{
    width:300px;
    height:300px;
    top:-120px;
    left:-100px;
}

.circle2{
    width:250px;
    height:250px;
    bottom:-100px;
    right:-80px;
}

.circle3{
    width:180px;
    height:180px;
    top:80px;
    right:180px;
}

/* Container */

.login-container{
    width:900px;
    max-width:95%;
    background:#fff;
    border-radius:30px;
    overflow:hidden;
    display:flex;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    z-index:100;
}

/* Left */

.left-side{
    width:45%;
    background:linear-gradient(135deg,#5B21B6,#7C3AED);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.left-side i{
    font-size:80px;
    margin-bottom:20px;
}

.left-side h1{
    font-size:40px;
    margin-bottom:15px;
}

.left-side p{
    line-height:28px;
    color:#E9D5FF;
}

/* Right */

.right-side{
    width:55%;
    padding:50px;
}

.right-side h2{
    font-size:40px;
    color:#5B21B6;
    margin-bottom:10px;
}

.right-side .subtitle{
    color:#666;
    margin-bottom:30px;
}

/* Input */

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px 15px 15px 50px;
    border:none;
    outline:none;
    background:#F3F0FF;
    border-radius:12px;
    font-size:15px;
}

.input-box i{
    position:absolute;
    top:16px;
    left:18px;
    color:#7C3AED;
}

/* Options */

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.remember{
    display:flex;
    align-items:center;
    gap:8px;
}

.options a{
    text-decoration:none;
    color:#7C3AED;
    font-weight:600;
}

/* Button */

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#5B21B6,#7C3AED);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-3px);
}

/* Social */

.social-text{
    text-align:center;
    margin:25px 0 15px;
    color:#777;
}

.social-icons{
    display:flex;
    justify-content:center;
    gap:15px;
}

.social-icons a{
    width:45px;
    height:45px;
    background:#F3F0FF;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#7C3AED;
    text-decoration:none;
    font-size:18px;
}

.social-icons a:hover{
    background:#7C3AED;
    color:white;
}

.register{
    text-align:center;
    margin-top:25px;
}

.register a{
    color:#7C3AED;
    text-decoration:none;
    font-weight:600;
}

/* Mobile */

@media(max-width:768px){

    .login-container{
        flex-direction:column;
    }

    .left-side,
    .right-side{
        width:100%;
    }

    .left-side{
        padding:40px 30px;
    }

    .right-side{
        padding:35px 25px;
    }

    .options{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }
}

</style>
</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="login-container">

    <div class="left-side">

        <i class="fa-solid fa-music"></i>

        <h1>Drizzle Dance</h1>

        <p>
            Welcome back to your dance journey.
            Login and continue learning, performing,
            and growing with us.
        </p>

    </div>

    <div class="right-side">

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Login to continue your dance journey.
        </p>

        <form id="loginForm">

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required>
            </div>

            <div class="options">

                <label class="remember">
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button onclick="home.html" type="submit" class="login-btn">
                Login
            </button>

        </form>

        <p class="social-text">
            Or continue with
        </p>

        <div class="social-icons">

            <a href="#">
                <i class="fa-brands fa-google"></i>
            </a>

            <a href="#">
                <i class="fa-brands fa-facebook-f"></i>
            </a>

            <a href="#">
                <i class="fa-brands fa-instagram"></i>
            </a>

        </div>

        <div class="register">
            Don't have an account?
            <a href="create_account.html">Create Account</a>
        </div>

    </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(event){

    event.preventDefault();

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    let storedEmail =
    localStorage.getItem("userEmail");

    let storedPassword =
    localStorage.getItem("userPassword");

    if(email === "" || password === ""){

        alert("Please fill all fields");

    }
    else if(email !== storedEmail ||
            password !== storedPassword){

        alert("Invalid Email or Password");

    }
    else{

        sessionStorage.setItem("sessionEmail",email);

        alert("Login Successful");

        window.location.href="home.html";
    }

});

</script>

</body>
</html>
